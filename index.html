<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gradation Report Generator — Kraemer Mining & Materials, Inc.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#e6e9ea;
    --panel:#f5f6f6;
    --panel-2:#eceeee;
    --ink:#1c1f21;
    --ink-soft:#454b4e;
    --ink-faint:#6b7175;
    --rust:#b23a2f;
    --rust-dark:#8c2c23;
    --slate:#3d5a73;
    --slate-dark:#2c4256;
    --olive:#5c6e4f;
    --line:#b7bbbd;
    --line-strong:#8b9092;
    --amber:#c07d1e;
    --radius:3px;
    --shadow:0 1px 2px rgba(20,22,23,0.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'IBM Plex Sans',sans-serif;
    font-size:13px;
    line-height:1.4;
    min-height:100vh;
  }
  .app{
    max-width:1680px;
    margin:0 auto;
    padding:16px 20px 40px;
  }

  /* ---------- header ---------- */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding-bottom:12px;
    margin-bottom:14px;
    border-bottom:2px solid var(--ink);
  }
  .brand{
    display:flex;
    align-items:baseline;
    gap:10px;
  }
  .brand h1{
    font-family:'Barlow Condensed',sans-serif;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.04em;
    font-size:26px;
    margin:0;
    color:var(--ink);
  }
  .brand .sub{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--ink-faint);
    letter-spacing:0.03em;
  }
  .authbox{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:12px;
  }
  .authbox .who{
    font-family:'IBM Plex Mono',monospace;
    color:var(--ink-soft);
  }
  button{
    font-family:'IBM Plex Sans',sans-serif;
    font-size:12px;
    font-weight:600;
    letter-spacing:0.02em;
    border-radius:var(--radius);
    border:1px solid var(--line-strong);
    background:var(--panel);
    color:var(--ink);
    padding:7px 14px;
    cursor:pointer;
    transition:background .12s ease, border-color .12s ease;
  }
  button:hover:not(:disabled){background:#fff;border-color:var(--ink-soft);}
  button:disabled{opacity:0.45;cursor:not-allowed;}
  button.primary{background:var(--rust);border-color:var(--rust-dark);color:#fff;}
  button.primary:hover:not(:disabled){background:var(--rust-dark);}
  button.ghost{background:transparent;border-color:var(--line);}

  /* ---------- status / error banners ---------- */
  #errorBanner{
    display:none;
    background:#fbeceb;
    border:1px solid var(--rust);
    color:var(--rust-dark);
    padding:9px 12px;
    border-radius:var(--radius);
    font-size:12px;
    margin-bottom:12px;
    font-family:'IBM Plex Mono',monospace;
  }
  #signedOutNotice{
    padding:60px 20px;
    text-align:center;
    color:var(--ink-soft);
  }
  #signedOutNotice h2{
    font-family:'Barlow Condensed',sans-serif;
    text-transform:uppercase;
    letter-spacing:0.03em;
    font-size:22px;
    color:var(--ink);
  }

  /* ---------- control panel ---------- */
  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:14px 16px;
    margin-bottom:14px;
    box-shadow:var(--shadow);
  }
  .controls-row{
    display:flex;
    flex-wrap:wrap;
    align-items:flex-end;
    gap:0;
  }
  .field{
    display:flex;
    flex-direction:column;
    gap:4px;
    padding:0 16px 8px 0;
    position:relative;
  }
  .field + .field{
    border-left:1px dotted var(--line-strong);
    padding-left:16px;
  }
  .field.full-width{
    flex-basis:100%;
    border-left:none;
    padding-left:0;
    margin-top:2px;
  }
  .field label{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.07em;
    color:var(--ink-faint);
  }
  select, input[type="date"], input[type="number"], textarea{
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    color:var(--ink);
    border:1px solid var(--line-strong);
    border-radius:var(--radius);
    background:#fff;
    padding:6px 8px;
  }
  select{min-width:150px;}
  input[type="date"]{min-width:130px;}
  input[type="number"]{width:64px;}
  .daterange{display:flex;align-items:center;gap:6px;}
  .daterange span{color:var(--ink-faint);font-size:11px;}
  .checkgroup{display:flex;gap:10px;align-items:center;padding-top:2px;}
  .checkgroup label{
    display:flex;align-items:center;gap:5px;
    font-family:'IBM Plex Sans',sans-serif;
    font-size:12px;text-transform:none;letter-spacing:0;color:var(--ink);
  }
  .checkgroup input{accent-color:var(--slate);}
  .toggles{display:flex;gap:14px;}
  .toggles label{
    display:flex;align-items:center;gap:6px;
    font-size:12px;color:var(--ink);cursor:pointer;
  }
  .toggles input{accent-color:var(--rust);}
  .swatch{width:14px;height:3px;display:inline-block;border-radius:1px;}
  .sw-avg{background:var(--rust);}
  .sw-minmax{background:#000;}
  .sw-spec{background:var(--ink-faint);border-top:2px dashed var(--ink-faint);height:0;}

  .status-line{
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    color:var(--ink-faint);
    margin-top:8px;
    padding-top:8px;
    border-top:1px dotted var(--line);
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .status-line .loading{color:var(--slate);}

  /* ---------- chart ---------- */
  .chart-panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:12px 16px 8px;
    margin-bottom:14px;
    box-shadow:var(--shadow);
    position:relative;
  }
  .panel-title{
    font-family:'Barlow Condensed',sans-serif;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:0.04em;
    font-size:15px;
    color:var(--ink);
    margin:0 0 6px;
  }
  .chart-wrap{position:relative;width:100%;}
  .chart-wrap svg{width:100%;height:auto;display:block;}
  .chart-empty{
    text-align:center;color:var(--ink-faint);padding:60px 0;font-size:12px;
  }
  .chart-loading-overlay{
    position:absolute;inset:0;background:rgba(245,246,246,0.75);
    display:none;align-items:center;justify-content:center;
    font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--slate-dark);
  }

  /* ---------- main content layout: test history left, chart+summary stacked right ---------- */
  .main-grid{
    display:grid;
    grid-template-columns:1.3fr 0.85fr;
    gap:14px;
    margin-bottom:14px;
    align-items:stretch;
  }
  @media (max-width:1100px){
    .main-grid{grid-template-columns:1fr;}
  }
  .main-grid .right-col{
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .main-grid .right-col .chart-panel,
  .main-grid .right-col .table-panel{
    margin-bottom:0;
  }
  .table-panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:12px 14px;
    box-shadow:var(--shadow);
    overflow-x:auto;
    overflow-y:auto;
  }
  #testPickerPanel{
    max-height:700px;
  }
  #summaryPanel{
    max-height:320px;
  }
  table{border-collapse:collapse;width:auto;font-size:10.5px;}
  thead th{
    position:sticky;top:0;background:var(--panel-2);
    font-family:'IBM Plex Mono',monospace;
    font-size:9.5px;text-transform:uppercase;letter-spacing:0.03em;
    color:var(--ink-soft);
    text-align:right;
    padding:4px 5px;
    border-bottom:1px solid var(--line-strong);
    white-space:nowrap;
  }
  thead th.left, tbody td.left{text-align:left;}
  thead th.center, tbody td.center{text-align:center;width:44px;min-width:44px;}
  tbody td{
    padding:3px 5px;
    border-bottom:1px solid var(--line);
    text-align:right;
    font-family:'IBM Plex Mono',monospace;
    color:var(--ink);
    white-space:nowrap;
  }
  tbody tr:hover{background:#fbfbfb;}
  tbody tr.avg-row{
    background:#f2e7e5;
    font-weight:600;
  }
  tbody tr.avg-row td{border-top:2px solid var(--rust);color:var(--rust-dark);}
  tbody tr.footnote-row td{
    border-bottom:none;padding-top:3px;padding-bottom:2px;
    font-family:'IBM Plex Sans',sans-serif;font-style:normal;
    font-size:10px;color:var(--ink-faint);text-align:left;white-space:normal;
  }
  .notes-cell{
    white-space:nowrap;
    text-align:left;font-family:'IBM Plex Sans',sans-serif;color:var(--ink-soft);
  }
  td.spec-out{color:var(--rust);font-weight:600;}
  .empty-row td{text-align:center;color:var(--ink-faint);font-style:normal;padding:16px;}

  /* ---------- comments / report ---------- */
  .bottom-row{
    display:grid;
    grid-template-columns:1fr auto;
    gap:14px;
    align-items:end;
  }
  @media (max-width:800px){.bottom-row{grid-template-columns:1fr;}}
  .comments-panel{
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:12px 14px;box-shadow:var(--shadow);
  }
  textarea{width:100%;min-height:64px;resize:vertical;font-family:'IBM Plex Sans',sans-serif;}
  .generate-panel{
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:12px 14px;box-shadow:var(--shadow);
    display:flex;flex-direction:column;gap:6px;align-items:flex-start;
    width:fit-content;
  }
  .generate-panel .hint{font-size:10.5px;color:var(--ink-faint);text-align:right;align-self:flex-end;}
  .report-checkbox{
    display:flex;align-items:center;gap:6px;
    font-size:12px;color:var(--ink);cursor:pointer;
  }
  .report-checkbox input{accent-color:var(--rust);}
  #generateBtn{font-size:13px;padding:8px 22px;align-self:center;}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="brand">
      <h1>Gradation Report Generator</h1>
      <span class="sub">KRAEMER MINING &amp; MATERIALS, INC. · TECHNICAL SERVICES</span>
    </div>
    <div class="authbox" id="authbox">
      <span class="who" id="whoami"></span>
      <button id="signInBtn">Sign in</button>
      <button id="signOutBtn" class="ghost" style="display:none;">Sign out</button>
    </div>
  </div>

  <div id="errorBanner"></div>

  <div id="signedOutNotice">
    <h2>Sign in to load gradation data</h2>
    <p>Use your Kraemer Materials Microsoft 365 account.</p>
  </div>

  <div id="appBody" style="display:none;">

    <!-- ================= CONTROL PANEL ================= -->
    <div class="panel">
      <div class="controls-row">
        <div class="field">
          <label>Quarry</label>
          <select id="quarrySelect"></select>
        </div>
        <div class="field">
          <label>Product</label>
          <select id="productSelect"></select>
        </div>
        <div class="field full-width" id="customProductGroup" style="display:none;">
          <label>Custom products <span style="text-transform:none;">(select one or more to combine)</span></label>
          <div class="checkgroup" id="customProductCheckboxes" style="flex-wrap:wrap;"></div>
        </div>
        <div class="field">
          <label>Sample type</label>
          <div class="checkgroup" id="sampleTypeGroup"></div>
        </div>
        <div class="field">
          <label>Date range</label>
          <div class="daterange">
            <input type="date" id="startDate">
            <span>&ndash;</span>
            <input type="date" id="endDate">
          </div>
        </div>
        <div class="field">
          <label>Show last N tests <span style="text-transform:none;">(0 = all)</span></label>
          <input type="number" id="lastNInput" min="0" step="1" value="20">
        </div>
        <div class="field">
          <label>Chart overlays</label>
          <div class="toggles">
            <label><span class="swatch sw-spec"></span> Spec range <input type="checkbox" id="toggleSpec" checked></label>
            <label><span class="swatch sw-minmax"></span> Min / Max <input type="checkbox" id="toggleMinMax" checked></label>
            <label>Selected days only <input type="checkbox" id="toggleSelectedDaysOnly"></label>
          </div>
        </div>
      </div>
      <div class="status-line">
        <span id="statusText">—</span>
        <span id="loadingText" class="loading" style="display:none;">Loading data from SharePoint…</span>
      </div>
    </div>

    <!-- ================= MAIN: test history left, chart + summary right ================= -->
    <div class="main-grid">
      <div class="table-panel" id="testPickerPanel">
        <h2 class="panel-title">Test History</h2>
        <table id="testPickerTable">
          <thead><tr></tr></thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="right-col">
        <div class="chart-panel">
          <h2 class="panel-title" id="chartTitle">Particle Size Distribution</h2>
          <div class="chart-wrap" id="chartWrap">
            <div class="chart-empty">No data for this selection.</div>
            <div class="chart-loading-overlay" id="chartLoadingOverlay">Loading…</div>
          </div>
        </div>

        <div class="table-panel" id="summaryPanel">
          <h2 class="panel-title">Report Summary</h2>
          <table id="summaryTable">
            <thead><tr></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ================= COMMENTS / GENERATE ================= -->
    <div class="bottom-row">
      <div class="comments-panel">
        <label for="reportComments" style="font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.07em;color:var(--ink-faint);">Report comments</label>
        <textarea id="reportComments" placeholder="Notes to include on the generated report…" style="margin-top:6px;"></textarea>
      </div>
      <div class="generate-panel">
        <label class="report-checkbox"><input type="checkbox" id="genGradationReport" checked> Gradation Report</label>
        <label class="report-checkbox"><input type="checkbox" id="genCertOfAgg" checked> Cert of Agg</label>
        <button class="primary" id="generateBtn">Generate Report(s)</button>
        <span class="hint" id="generateHint"></span>
      </div>
    </div>

  </div>
</div>

  /* ================================================================
     DATE HELPERS (day-number space to avoid TZ/interval bugs)
     ================================================================ */
  function dayNum(d){ return Math.floor(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()) / 86400000); }
  function fromDayNum(n){ const d = new Date(n * 86400000); return new Date(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate()); }
  function addMonths(d, n){ const r = new Date(d); r.setMonth(r.getMonth() + n); return r; }
  function toInputDate(d){ return d.toISOString().slice(0,10); }
  function fromInputDate(s){ const [y,m,dd] = s.split("-").map(Number); return new Date(y, m-1, dd); }
  function isoStartOfDay(d){ return d.getFullYear() + "-" + pad2(d.getMonth()+1) + "-" + pad2(d.getDate()) + "T00:00:00Z"; }
  function isoEndOfDay(d){ return d.getFullYear() + "-" + pad2(d.getMonth()+1) + "-" + pad2(d.getDate()) + "T23:59:59Z"; }
  function pad2(n){ return n < 10 ? "0"+n : ""+n; }
  function fmtDate(d){
    if (typeof d === "string") return fmtDateStr(d);
    return (d.getMonth()+1) + "/" + d.getDate() + "/" + d.getFullYear();
  }
  // SharePoint date-only fields come back as UTC-midnight ISO strings (e.g. "2026-07-14T00:00:00Z").
  // Parsing those with `new Date(...)` and then reading local getters shifts the calendar day in any
  // timezone behind UTC. These two helpers read the Y-M-D straight out of the string instead.
  function dayNumFromISODateUTC(s){
    const parts = String(s).slice(0,10).split("-").map(Number);
    return Math.floor(Date.UTC(parts[0], parts[1]-1, parts[2]) / 86400000);
  }
  function fmtDateStr(s){
    const parts = String(s).slice(0,10).split("-").map(Number);
    return parts[1] + "/" + parts[2] + "/" + parts[0];
  }

  /* ================================================================

     ================================================================ */
  async function initAuth(){
    msalInstance = new msal.PublicClientApplication(msalConfig);
    await msalInstance.initialize();
    try {
      const resp = await msalInstance.handleRedirectPromise();
      if (resp && resp.account) msalInstance.setActiveAccount(resp.account);
    } catch(e){ showError("Sign-in error: " + e.message); }

    activeAccount = msalInstance.getActiveAccount() || (msalInstance.getAllAccounts()[0] || null);
    if (activeAccount) { msalInstance.setActiveAccount(activeAccount); onSignedIn(); }
    else onSignedOut();

    $("signInBtn").addEventListener("click", () => msalInstance.loginRedirect({scopes: GRAPH_SCOPES}));
    $("signOutBtn").addEventListener("click", () => msalInstance.logoutRedirect());
  }

  async function getToken(){
    const request = {scopes: GRAPH_SCOPES, account: activeAccount};
    try {
      const result = await msalInstance.acquireTokenSilent(request);
      return result.accessToken;
    } catch(e){
      await msalInstance.acquireTokenRedirect(request);
      return null; // page will redirect away
    }
  }

    $("signOutBtn").style.display = "inline-block";
    $("whoami").textContent = activeAccount.name || activeAccount.username || "";
    bootstrap().catch(e => showError("Startup error: " + e.message));
  }
  function onSignedOut(){
    $("signedOutNotice").style.display = "block";
    $("appBody").style.display = "none";
    $("signInBtn").style.display = "inline-block";
    $("signOutBtn").style.display = "none";
    $("whoami").textContent = "";
  }

  /* ================================================================
     GRAPH HELPERS
     ================================================================ */
  async function graphGet(url, extraHeaders){
    const token = await getToken();
    if (!token) return null;
    const res = await fetch(url, {headers: Object.assign({Authorization: "Bearer " + token}, extraHeaders || {})});
    if (!res.ok){
      const body = await res.text().catch(()=> "");
      throw new Error("Graph " + res.status + " on " + url + " — " + body.slice(0,200));
    }
    return res.json();
  }

  async function getListId(displayName){
    if (listIdCache[displayName]) return listIdCache[displayName];
    const data = await graphGet(
      "https://graph.microsoft.com/v1.0/sites/" + SITE_ID + "/lists?$filter=" +
      encodeURIComponent("displayName eq '" + displayName + "'")
    );
    if (!data || !data.value || !data.value.length) throw new Error("SharePoint list not found: " + displayName);
    listIdCache[displayName] = data.value[0].id;
    return listIdCache[displayName];
  }

  async function graphGetAllPages(url, extraHeaders){
    let items = [];
    let next = url;
    while (next){
      const data = await graphGet(next, extraHeaders);
      if (!data) break;
      items = items.concat(data.value || []);
      next = data["@odata.nextLink"] || null;
    }
    return items;
  }

  async function loadProducts(){
    const listId = await getListId(PRODUCTS_LIST_NAME);
    const items = await graphGetAllPages(
      "https://graph.microsoft.com/v1.0/sites/" + SITE_ID + "/lists/" + listId + "/items?expand=fields&$top=200"
    );
    return items.map(i => i.fields);
  }

  // Custom products are one-off entries in Gradation_Master_Log (IsCustomProduct = true) and have no
  // corresponding row in Gradation_Products. To find them we need to look across the WHOLE log history,
  // not just the currently-loaded date window — but we only pull 3 narrow fields (not the 35 sieve
  // columns) so this stays cheap even as the log grows.
  async function loadCustomProductIndex(){
    const listId = await getListId(LOG_LIST_NAME);
    const url = "https://graph.microsoft.com/v1.0/sites/" + SITE_ID + "/lists/" + listId +
      "/items?expand=fields(select=Quarry,Product,IsCustomProduct)&$top=500";
    const items = await graphGetAllPages(url);
    const seen = new Map();
    items.forEach(i => {
      const f = i.fields || {};
      const isCustom = f.IsCustomProduct === true || f.IsCustomProduct === 1 || f.IsCustomProduct === "1" || f.IsCustomProduct === "Yes";
      if (isCustom && f.Quarry && f.Product){
        const key = f.Quarry + "||" + f.Product;
        if (!seen.has(key)) seen.set(key, {Quarry: f.Quarry, Product: f.Product});
      }
    });
    return Array.from(seen.values());
  }

  async function fetchTestsInRange(startDate, endDate){
    const listId = await getListId(LOG_LIST_NAME);
    const filter = encodeURIComponent(
      "fields/SampleDate ge '" + isoStartOfDay(startDate) + "' and fields/SampleDate le '" + isoEndOfDay(endDate) + "'"
    );
    const url = "https://graph.microsoft.com/v1.0/sites/" + SITE_ID + "/lists/" + listId +
      "/items?expand=fields&$filter=" + filter + "&$top=200";
    const items = await graphGetAllPages(url, {Prefer: "HonorNonIndexedQueriesWarningMayFailRandomly"});
    return items.map(i => Object.assign({_itemId: i.id}, i.fields));
  }

  /* ================================================================
     RANGE-COALESCING CACHE
     ================================================================ */
  function mergeLoadedRange(startDay, endDay){
    loadedRanges.push({start: startDay, end: endDay});
    loadedRanges.sort((a,b) => a.start - b.start);
    const merged = [];
    for (const r of loadedRanges){
      if (merged.length && r.start <= merged[merged.length-1].end + 1){
        merged[merged.length-1].end = Math.max(merged[merged.length-1].end, r.end);
      } else merged.push({start:r.start, end:r.end});
    }
    loadedRanges = merged;
  }

  function getGaps(startDay, endDay){
    let gaps = [{start:startDay, end:endDay}];
    for (const r of loadedRanges){
      const next = [];
      for (const g of gaps){
        if (r.end < g.start || r.start > g.end){ next.push(g); continue; }
        if (r.start > g.start) next.push({start:g.start, end:r.start-1});
        if (r.end < g.end) next.push({start:r.end+1, end:g.end});
      }
      gaps = next;
    }
    return gaps.filter(g => g.start <= g.end);
  }

  async function ensureDataLoaded(startDate, endDate){
    const gaps = getGaps(dayNum(startDate), dayNum(endDate));
    if (!gaps.length) return;
    setLoading(true);
    clearError();
    try {
      for (const g of gaps){
        const rows = await fetchTestsInRange(fromDayNum(g.start), fromDayNum(g.end));
        const known = new Set(allTests.map(t => t._itemId));
        for (const row of rows){ if (!known.has(row._itemId)){ allTests.push(row); known.add(row._itemId); } }
        mergeLoadedRange(g.start, g.end);
      }
    } catch(e){
      showError("Could not load data from SharePoint: " + e.message);
    } finally {
      setLoading(false);
      updateStatusLine();
    }
  }

  function updateStatusLine(){
    if (!loadedRanges.length){ $("statusText").textContent = "No data cached yet."; return; }
    const first = loadedRanges[0].start, last = loadedRanges[loadedRanges.length-1].end;
    $("statusText").textContent =
      "Cached: " + fmtDate(fromDayNum(first)) + " – " + fmtDate(fromDayNum(last)) +
      "  (" + allTests.length + " tests in memory)";
  }

  /* ================================================================
     BOOTSTRAP
     ================================================================ */
  async function bootstrap(){
    setLoading(true);
    clearError();
    try {
      products = await loadProducts();
    } catch(e){
      showError("Could not load Gradation_Products: " + e.message);
      setLoading(false);
      return;
    }

    try {
      customProductIndex = await loadCustomProductIndex();
    } catch(e){
      console.error("Could not load custom product index: " + e.message);
      customProductIndex = []; // non-fatal — Custom option just shows none available
    }

    quarries = Array.from(new Set(products.map(p => p.Quarry).filter(Boolean))).sort();
    populateSelect($("quarrySelect"), quarries);
    selectedQuarry = quarries[0] || null;
    refreshProductOptions();

    const today = new Date();
    const loadStart = addMonths(today, -LOAD_WINDOW_MONTHS);
    displayEnd = today;
    displayStart = addMonths(today, -DEFAULT_DISPLAY_MONTHS);
    $("startDate").value = toInputDate(displayStart);
    $("endDate").value = toInputDate(displayEnd);

    renderSampleTypeGroup();
    wireControls();

    await ensureDataLoaded(loadStart, today);
    resetIncludedToLastN();
    render();
  }

  function populateSelect(sel, values){
    sel.innerHTML = "";
    values.forEach(v => {
      const opt = document.createElement("option");
      opt.value = v; opt.textContent = v;
      sel.appendChild(opt);
    });
  }

  function refreshProductOptions(){
    productsForQuarry = products.filter(p => p.Quarry === selectedQuarry &&
      (p.Active === undefined || p.Active === null || p.Active === true || p.Active === "1" || p.Active === "Yes"));
    if (!productsForQuarry.length) productsForQuarry = products.filter(p => p.Quarry === selectedQuarry);
    const names = productsForQuarry.map(p => p.Title).filter(Boolean);
    populateSelect($("productSelect"), names);
    const customOpt = document.createElement("option");
    customOpt.value = "__CUSTOM__";
    customOpt.textContent = "Custom…";
    $("productSelect").appendChild(customOpt);

    productMode = "single";
    selectedProduct = names[0] || null;
    selectedCustomProducts = new Set();
    $("customProductGroup").style.display = "none";
  }

  function renderCustomProductOptions(){
    const box = $("customProductCheckboxes");
    box.innerHTML = "";
    const options = customProductIndex.filter(c => c.Quarry === selectedQuarry);
    if (!options.length){
      box.innerHTML = '<span style="font-size:11px;color:var(--ink-faint);">No custom products found for this quarry.</span>';
      return;
    }
    options.forEach(c => {
      const label = document.createElement("label");
      const cb = document.createElement("input");
      cb.type = "checkbox"; cb.checked = selectedCustomProducts.has(c.Product);
      cb.addEventListener("change", () => {
        if (cb.checked) selectedCustomProducts.add(c.Product); else selectedCustomProducts.delete(c.Product);
        resetIncludedToLastN();
        render();
      });
      label.appendChild(cb);
      label.appendChild(document.createTextNode(c.Product));
      box.appendChild(label);
    });
  }

  function getProductDisplayName(){
    if (productMode === "custom"){
      return selectedCustomProducts.size ? Array.from(selectedCustomProducts).join(" + ") : "Custom (none selected)";
    }
    return selectedProduct;
  }

  function renderSampleTypeGroup(){
    const group = $("sampleTypeGroup");
    group.innerHTML = "";
    ["Production","Loadout","Other"].forEach(t => {
      const label = document.createElement("label");
      const cb = document.createElement("input");
      cb.type = "checkbox"; cb.checked = selectedSampleTypes[t]; cb.dataset.type = t;
      cb.addEventListener("change", () => {
        selectedSampleTypes[t] = cb.checked;
        resetIncludedToLastN();
        render();
      });
      label.appendChild(cb);
      label.appendChild(document.createTextNode(t));
      group.appendChild(label);
    });
  }

  function wireControls(){
    $("quarrySelect").addEventListener("change", e => {
      selectedQuarry = e.target.value;
      refreshProductOptions();
      resetIncludedToLastN();
      render();
    });
    $("productSelect").addEventListener("change", e => {
      if (e.target.value === "__CUSTOM__"){
        productMode = "custom";
        selectedProduct = null;
        selectedCustomProducts = new Set();
        renderCustomProductOptions();
        $("customProductGroup").style.display = "block";
      } else {
        productMode = "single";
        selectedProduct = e.target.value;
        $("customProductGroup").style.display = "none";
      }
      resetIncludedToLastN();
      render();
    });
    $("startDate").addEventListener("change", async e => {
      displayStart = fromInputDate(e.target.value);
      await ensureDataLoaded(displayStart, displayEnd);
      render();
    });
    $("endDate").addEventListener("change", async e => {
      displayEnd = fromInputDate(e.target.value);
      await ensureDataLoaded(displayStart, displayEnd);
      render();
    });
    $("lastNInput").addEventListener("input", e => {
      lastN = Math.max(0, parseInt(e.target.value || "0", 10));
      render();
    });
    $("toggleSpec").addEventListener("change", e => { showSpec = e.target.checked; render(); });
    $("toggleMinMax").addEventListener("change", e => { showMinMax = e.target.checked; render(); });
    $("toggleSelectedDaysOnly").addEventListener("change", e => { chartSelectedDaysOnly = e.target.checked; render(); });
  }

  /* ================================================================
     DATA MODEL — filtering, day-averaging, stats
     ================================================================ */
  function getCurrentProductFields(){
    return productsForQuarry.find(p => p.Title === selectedProduct) || null;
  }

  function getSievesForProduct(productFields){
    if (!productFields) return [];
    return SIEVE_DEFS.filter(s => {
      const v = productFields[s.key];
      return v !== undefined && v !== null && String(v).trim() !== "";
    });
  }

  // Custom products have no Gradation_Products spec row, so "which sieves apply" is derived from
  // whichever sieve columns actually have values in the matching test rows themselves.
  function getSievesFromTests(tests){
    return SIEVE_DEFS.filter(s => tests.some(t => {
      const v = t[s.key + "_Pct"];
      return v !== undefined && v !== null && String(v).trim() !== "";
    }));
  }

  function testsInDateRange(start, end){
    const s = dayNum(start), e = dayNum(end);
    return allTests.filter(t => {
      if (t.Quarry !== selectedQuarry) return false;
      if (productMode === "custom"){
        if (!selectedCustomProducts.has(t.Product)) return false;
      } else {
        if (t.Product !== selectedProduct) return false;
      }
      if (!selectedSampleTypes[t.SampleType]) return false;
      if (!t.SampleDate) return false;
      const d = dayNumFromISODateUTC(t.SampleDate);
      return d >= s && d <= e;
    });
  }

  function sortKey(t){ return (t.SampleDate || "") + "T" + (t.SampleTime || "00:00:00"); }

  function computeDayAverages(tests, sieves){
    const groups = {};
    tests.forEach(t => {
      const day = (t.SampleDate || "").slice(0,10);
      if (!groups[day]) groups[day] = [];
      groups[day].push(t);
    });
    return Object.keys(groups).map(day => {
      const rows = groups[day];
      const values = {};
      sieves.forEach(s => {
        const vals = rows.map(r => parseFloat(r[s.key + "_Pct"])).filter(v => !isNaN(v));
        values[s.key] = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
      });
      return {date: day, values: values};
    });
  }

  function computeStats(dayAverages, sieves){
    const avg = {}, min = {}, max = {};
    sieves.forEach(s => {
      const vals = dayAverages.map(d => d.values[s.key]).filter(v => v !== null && v !== undefined);
      if (!vals.length){ avg[s.key]=null; min[s.key]=null; max[s.key]=null; return; }
      avg[s.key] = vals.reduce((a,b)=>a+b,0)/vals.length;
      min[s.key] = Math.min.apply(null, vals);
      max[s.key] = Math.max.apply(null, vals);
    });
    return {avg, min, max};
  }

  function parseSpec(raw){
    if (raw === undefined || raw === null || String(raw).trim() === "") return null;
    const str = String(raw).trim();
    if (str === "*") return {low:null, high:null, wildcard:true};
    if (str.indexOf("-") !== -1){
      const parts = str.split("-").map(s => parseFloat(s.trim()));
      return {low:parts[0], high:parts[1]};
    }
    const v = parseFloat(str);
    return {low:v, high:v};
  }

  function resetIncludedToLastN(){
    includedTestIds = new Set();
    const rangeTests = testsInDateRange(displayStart, displayEnd).sort((a,b) => sortKey(b).localeCompare(sortKey(a)));
    rangeTests.slice(0, AUTO_SELECT_LAST_N).forEach(t => includedTestIds.add(t._itemId));
  }

  /* ================================================================
     RENDER — top level
     ================================================================ */
  function render(){
    const productFields = getCurrentProductFields();
    const rangeTestsRecentFirst = testsInDateRange(displayStart, displayEnd).sort((a,b) => sortKey(b).localeCompare(sortKey(a)));
    const rangeTests = rangeTestsRecentFirst.slice().sort((a,b) => sortKey(a).localeCompare(sortKey(b)));
    const sieves = productMode === "custom" ? getSievesFromTests(rangeTests) : getSievesForProduct(productFields);
    const shownTests = (lastN > 0 ? rangeTestsRecentFirst.slice(0, lastN) : rangeTestsRecentFirst)
      .slice().sort((a,b) => sortKey(a).localeCompare(sortKey(b)));

    const fullRangeDayAverages = computeDayAverages(rangeTests, sieves);
    const fullRangeStats = computeStats(fullRangeDayAverages, sieves);

    const includedTests = allTests.filter(t => includedTestIds.has(t._itemId));
    const includedDayAverages = computeDayAverages(includedTests, sieves).sort((a,b) => a.date.localeCompare(b.date));
    const selectedDaysStats = computeStats(includedDayAverages, sieves);

    const activeStats = chartSelectedDaysOnly ? selectedDaysStats : fullRangeStats;

    const specs = {};
    sieves.forEach(s => specs[s.key] = productFields ? parseSpec(productFields[s.key]) : null);

    $("chartTitle").textContent = (getProductDisplayName() || "—") + " Particle Size Distribution " +
      (chartSelectedDaysOnly ? "FOR SELECTED TEST DAYS" : (fmtDate(displayStart) + " – " + fmtDate(displayEnd)));

    renderChart(sieves, activeStats, specs);
    renderTestPicker(shownTests, sieves);
    renderSummary(sieves, includedDayAverages, activeStats, chartSelectedDaysOnly);

    lastRenderState = {
      productFields: productFields,
      sieves: sieves,
      stats: activeStats,
      specs: specs,
      includedDayAverages: includedDayAverages,
      chartSelectedDaysOnly: chartSelectedDaysOnly,
      showSpec: showSpec,
      showMinMax: showMinMax
    };
  }

  /* ================================================================
     CHART (SVG)
     ================================================================ */
  function renderChart(sieves, stats, specs){
    const wrap = $("chartWrap");
    wrap.querySelectorAll("svg").forEach(n => n.remove());
    const emptyMsg = wrap.querySelector(".chart-empty");
    if (!sieves.length){ emptyMsg.style.display = "block"; return; }
    emptyMsg.style.display = "none";

    const W = 1000, H = 500;
    const marginLeft = 54, marginRight = 24, marginTop = 66, marginBottom = 44;
    const plotW = W - marginLeft - marginRight;
    const plotH = H - marginTop - marginBottom;

    const mms = sieves.map(s => s.mm);
    const minMm = Math.min.apply(null, mms), maxMm = Math.max.apply(null, mms);
    const logMinRaw = Math.log10(minMm), logMaxRaw = Math.log10(maxMm);
    const logRange = (logMaxRaw - logMinRaw) || 1;
    const logPad = logRange * 0.06;
    const logMin = logMinRaw - logPad;
    const logMax = logMaxRaw + logPad;
    const domainMinMm = Math.pow(10, logMin), domainMaxMm = Math.pow(10, logMax);

    function xOf(mm){
      if (logMax === logMin) return marginLeft + plotW/2;
      const t = (Math.log10(mm) - logMin) / (logMax - logMin);
      return marginLeft + (1 - t) * plotW; // largest mm on the left
    }
    function yOf(pct){ return marginTop + (1 - (pct/100)) * plotH; }

    let svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Mono, monospace">';

    // horizontal gridlines + y labels
    for (let p = 0; p <= 100; p += 20){
      const y = yOf(p);
      svg += '<line x1="' + marginLeft + '" y1="' + y + '" x2="' + (W-marginRight) + '" y2="' + y + '" stroke="#c9cccd" stroke-width="1"/>';
      svg += '<text x="' + (marginLeft-9) + '" y="' + (y+4) + '" font-size="12" fill="#454b4e" text-anchor="end">' + p + '</text>';
    }
    svg += '<text x="16" y="' + (marginTop + plotH/2) + '" font-size="12" fill="#454b4e" text-anchor="middle" transform="rotate(-90 16 ' + (marginTop+plotH/2) + ')">% Passing</text>';

    // log-scale mm axis: standard semi-log gridlines (1,2,3...9 per decade), numeric labels only at powers of ten.
    // The plotted domain itself is padded (domainMinMm..domainMaxMm) so these gridlines land inside the plot area.
    const loE = Math.floor(Math.log10(domainMinMm));
    const hiE = Math.ceil(Math.log10(domainMaxMm));
    for (let e = loE; e <= hiE; e++){
      for (let m = 1; m <= 9; m++){
        const v = m * Math.pow(10, e);
        if (v < domainMinMm || v > domainMaxMm) continue;
        const x = xOf(v);
        const isMajor = (m === 1);
        svg += '<line x1="' + x + '" y1="' + marginTop + '" x2="' + x + '" y2="' + (marginTop+plotH) + '" stroke="' +
          (isMajor ? '#bcc0c1' : '#dcdfe0') + '" stroke-width="' + (isMajor ? 1 : 0.75) + '"/>';
        if (isMajor){
          const label = v >= 1 ? (Math.round(v*100)/100).toString() : v.toFixed(3).replace(/0+$/,'').replace(/\.$/,'');
          svg += '<text x="' + x + '" y="' + (marginTop+plotH+16) + '" font-size="10.5" fill="#6b7175" text-anchor="middle">' + label + '</text>';
        }
      }
    }
    svg += '<text x="' + (marginLeft+plotW/2) + '" y="' + (H-4) + '" font-size="11.5" fill="#454b4e" text-anchor="middle">Sieve Size (mm)</text>';

    // sieve markers used by this product: label at top + a short dash underneath (no full-height line).
    // If two adjacent labels would overlap, the leftmost one is raised so the text stays legible.
    const sieveFontSize = 12;
    const charW = sieveFontSize * 0.62;
    const raised = new Array(sieves.length).fill(false);
    for (let i = 0; i < sieves.length - 1; i++){
      const xi = xOf(sieves[i].mm), xj = xOf(sieves[i+1].mm);
      const wi = sieves[i].label.length * charW, wj = sieves[i+1].label.length * charW;
      if ((xj - xi) < (wi/2 + wj/2 + 5)) raised[i] = true;
    }
    sieves.forEach((s, i) => {
      const x = xOf(s.mm);
      const labelY = raised[i] ? (marginTop - 8 - 16) : (marginTop - 8);
      svg += '<text x="' + x + '" y="' + labelY + '" font-size="' + sieveFontSize + '" fill="#3a3f42" text-anchor="middle">' + escapeXml(s.label) + '</text>';
      svg += '<line x1="' + x + '" y1="' + (marginTop-3) + '" x2="' + x + '" y2="' + (marginTop+6) + '" stroke="#3a3f42" stroke-width="2"/>';
    });

    // spec low/high (gray dashed)
    if (showSpec){
      ["low","high"].forEach(bound => {
        let pts = [];
        sieves.forEach(s => {
          const spec = specs[s.key];
          if (spec && !spec.wildcard && spec[bound] !== null && spec[bound] !== undefined && !isNaN(spec[bound])){
            pts.push([xOf(s.mm), yOf(spec[bound])]);
          }
        });
        if (pts.length > 1){
          svg += '<polyline points="' + pts.map(p=>p.join(",")).join(" ") + '" fill="none" stroke="#6b7175" stroke-width="1.5" stroke-dasharray="5,4"/>';
        }
      });
    }

    // min/max (black, no markers)
    if (showMinMax){
      ["min","max"].forEach(bound => {
        let pts = [];
        sieves.forEach(s => {
          const v = stats[bound][s.key];
          if (v !== null && v !== undefined) pts.push([xOf(s.mm), yOf(v)]);
        });
        if (pts.length > 1){
          svg += '<polyline points="' + pts.map(p=>p.join(",")).join(" ") + '" fill="none" stroke="#1c1f21" stroke-width="1.5"/>';
        }
      });
    }

    // average (dark red, bold, with markers) — always on
    {
      let pts = [];
      sieves.forEach(s => {
        const v = stats.avg[s.key];
        if (v !== null && v !== undefined) pts.push([xOf(s.mm), yOf(v)]);
      });
      if (pts.length > 1){
        svg += '<polyline points="' + pts.map(p=>p.join(",")).join(" ") + '" fill="none" stroke="#b23a2f" stroke-width="2.75"/>';
      }
      pts.forEach(p => { svg += '<circle cx="' + p[0] + '" cy="' + p[1] + '" r="3.5" fill="#b23a2f"/>'; });
    }

    svg += '</svg>';
    wrap.insertAdjacentHTML("beforeend", svg);
  }

  function escapeXml(s){
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  /* ================================================================
     TEST PICKER TABLE
     ================================================================ */
  function renderTestPicker(tests, sieves){
    const table = $("testPickerTable");
    const thead = table.querySelector("thead tr");
    const tbody = table.querySelector("tbody");
    thead.innerHTML = "";
    tbody.innerHTML = "";

    thead.innerHTML =
      '<th class="left">Incl.</th><th class="left">Date</th>' +
      sieves.map(s => '<th class="center">' + escapeXml(s.label) + '</th>').join("") +
      '<th class="left">Notes</th>';

    if (!tests.length){
      tbody.innerHTML = '<tr class="empty-row"><td colspan="' + (sieves.length+3) + '">No tests in this range.</td></tr>';
      return;
    }

    tests.forEach(t => {
      const tr = document.createElement("tr");
      const checked = includedTestIds.has(t._itemId);

      const tdInc = document.createElement("td");
      tdInc.className = "left";
      const cb = document.createElement("input");
      cb.type = "checkbox"; cb.checked = checked;
      cb.addEventListener("change", () => {
        if (cb.checked) includedTestIds.add(t._itemId); else includedTestIds.delete(t._itemId);
        render();
      });
      tdInc.appendChild(cb);
      tr.appendChild(tdInc);

      const tdDate = document.createElement("td");
      tdDate.className = "left";
      tdDate.textContent = t.SampleDate ? fmtDate(t.SampleDate) : "—";
      tr.appendChild(tdDate);

      sieves.forEach(s => {
        const td = document.createElement("td");
        td.className = "center";
        const v = t[s.key + "_Pct"];
        td.textContent = (v === undefined || v === null || v === "") ? "—" : Number(v).toFixed(1);
        tr.appendChild(td);
      });

      const tdNotes = document.createElement("td");
      tdNotes.className = "notes-cell";
      tdNotes.title = t.Notes || "";
      tdNotes.textContent = t.Notes || "";
      tr.appendChild(tdNotes);

      tbody.appendChild(tr);
    });
  }

  /* ================================================================
     SUMMARY TABLE — selected (included) tests + full-range average row
     ================================================================ */
  function renderSummary(sieves, includedDayAverages, stats, selectedDaysOnly){
    const table = $("summaryTable");
    const thead = table.querySelector("thead tr");
    const tbody = table.querySelector("tbody");
    thead.innerHTML = '<th class="left">Sample Date</th>' + sieves.map(s => '<th class="center">' + escapeXml(s.label) + '</th>').join("");
    tbody.innerHTML = "";

    if (!includedDayAverages.length && !sieves.length){
      tbody.innerHTML = '<tr class="empty-row"><td colspan="1">No tests selected.</td></tr>';
      return;
    }

    includedDayAverages.forEach(d => {
      const tr = document.createElement("tr");
      const tdDate = document.createElement("td");
      tdDate.className = "left";
      tdDate.textContent = fmtDate(d.date);
      tr.appendChild(tdDate);
      sieves.forEach(s => {
        const td = document.createElement("td");
        td.className = "center";
        const v = d.values[s.key];
        td.textContent = (v === null || v === undefined) ? "—" : v.toFixed(1);
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });

    const trAvg = document.createElement("tr");
    trAvg.className = "avg-row";
    const tdLabel = document.createElement("td");
    tdLabel.className = "left";
    tdLabel.textContent = "Average";
    trAvg.appendChild(tdLabel);
    sieves.forEach(s => {
      const td = document.createElement("td");
      td.className = "center";
      const v = stats.avg[s.key];
      td.textContent = (v === null || v === undefined) ? "—" : v.toFixed(1);
      trAvg.appendChild(td);
    });
    tbody.appendChild(trAvg);

    const trNote = document.createElement("tr");
    trNote.className = "footnote-row";
    const tdNote = document.createElement("td");
    tdNote.className = "left";
    tdNote.colSpan = sieves.length + 1;
    tdNote.textContent = selectedDaysOnly ? "Average is over selected test days." : "Average is over entire date range.";
    trNote.appendChild(tdNote);
    tbody.appendChild(trNote);
  }

  /* ================================================================
     REPORT GENERATION — PDF (jsPDF, vector chart) + G&B-104 Excel (surgical XML edit)
     ================================================================ */
  const KRAEMER_RED = [192, 0, 0]; // C00000, from the official Word template

  function drawChartPdf(doc, x0, y0, w, h, sieves, stats, specs, showSpecFlag, showMinMaxFlag){
    const scale = w / 1000; // chart is always drawn 2:1, matching the on-screen 1000x500 viewBox
    const mL = 54*scale, mR = 24*scale, mT = 66*scale, mB = 74*scale;
    const plotW = w - mL - mR, plotH = h - mT - mB;
    if (!sieves.length){
      doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(140,140,140);
      doc.text("No data for this selection.", x0+w/2, y0+h/2, {align:"center"});
      return;
    }
    const mms = sieves.map(s => s.mm);
    const minMm = Math.min.apply(null, mms), maxMm = Math.max.apply(null, mms);
    const logMinRaw = Math.log10(minMm), logMaxRaw = Math.log10(maxMm);
    const logRange = (logMaxRaw - logMinRaw) || 1;
    const logPad = logRange * 0.06;
    const logMin = logMinRaw - logPad, logMax = logMaxRaw + logPad;
    const domainMinMm = Math.pow(10, logMin), domainMaxMm = Math.pow(10, logMax);

    function xOf(mm){
      if (logMax === logMin) return x0 + mL + plotW/2;
      const t = (Math.log10(mm) - logMin) / (logMax - logMin);
      return x0 + mL + (1 - t) * plotW;
    }
    function yOf(pct){ return y0 + mT + (1 - (pct/100)) * plotH; }

    doc.setDrawColor(0,0,0); doc.setLineWidth(0.01);
    doc.rect(x0+mL, y0+mT, plotW, plotH);

    doc.setFont("helvetica","normal"); doc.setFontSize(7.5);
    for (let p = 0; p <= 100; p += 20){
      const yy = yOf(p);
      doc.setDrawColor(201,204,205); doc.setLineWidth(0.005);
      doc.line(x0+mL, yy, x0+w-mR, yy);
      doc.setTextColor(0,0,0);
      doc.text(String(p), x0+mL-0.06, yy+0.025, {align:"right"});
    }
    doc.setFontSize(7.5); doc.setTextColor(0,0,0);
    doc.text("% Passing", x0+0.14, y0+mT+plotH/2, {align:"center", angle:90});

    const loE = Math.floor(Math.log10(domainMinMm)), hiE = Math.ceil(Math.log10(domainMaxMm));
    for (let e = loE; e <= hiE; e++){
      for (let m = 1; m <= 9; m++){
        const v = m * Math.pow(10, e);
        if (v < domainMinMm || v > domainMaxMm) continue;
        const xx = xOf(v);
        const isMajor = (m === 1);
        if (isMajor) doc.setDrawColor(188,192,193); else doc.setDrawColor(220,223,224);
        doc.setLineWidth(isMajor ? 0.007 : 0.004);
        doc.line(xx, y0+mT, xx, y0+mT+plotH);
        if (isMajor){
          const label = v >= 1 ? (Math.round(v*100)/100).toString() : v.toFixed(3).replace(/0+$/,"").replace(/\.$/,"");
          doc.setTextColor(0,0,0); doc.setFontSize(7);
          doc.text(label, xx, y0+mT+plotH+0.16, {align:"center"});
        }
      }
    }
    doc.setTextColor(0,0,0); doc.setFontSize(8);
    doc.text("Sieve Size (mm)", x0+mL+plotW/2, y0+h-0.04, {align:"center"});

    const sieveFontSize = 7.6;
    const charW = (sieveFontSize/72) * 0.62;
    const raised = new Array(sieves.length).fill(false);
    for (let i = 0; i < sieves.length - 1; i++){
      const xi = xOf(sieves[i].mm), xj = xOf(sieves[i+1].mm);
      const wi = sieves[i].label.length * charW, wj = sieves[i+1].label.length * charW;
      if ((xj - xi) < (wi/2 + wj/2 + 0.04)) raised[i] = true;
    }
    doc.setFont("helvetica","normal"); doc.setFontSize(sieveFontSize);
    sieves.forEach((s, i) => {
      const xx = xOf(s.mm);
      const labelY = raised[i] ? (y0+mT-0.09-0.14) : (y0+mT-0.09);
      doc.setTextColor(0,0,0);
      doc.text(s.label, xx, labelY, {align:"center"});
      doc.setDrawColor(0,0,0); doc.setLineWidth(0.014);
      doc.line(xx, y0+mT-0.03, xx, y0+mT+0.05);
    });

    if (showSpecFlag){
      ["low","high"].forEach(bound => {
        const pts = [];
        sieves.forEach(s => {
          const spec = specs[s.key];
          if (spec && !spec.wildcard && spec[bound] !== null && spec[bound] !== undefined && !isNaN(spec[bound])){
            pts.push([xOf(s.mm), yOf(spec[bound])]);
          }
        });
        if (pts.length > 1){
          doc.setDrawColor(107,113,117); doc.setLineWidth(0.011);
          doc.setLineDashPattern([0.04,0.03], 0);
          for (let i=0;i<pts.length-1;i++) doc.line(pts[i][0],pts[i][1],pts[i+1][0],pts[i+1][1]);
          doc.setLineDashPattern([], 0);
        }
      });
    }

    if (showMinMaxFlag){
      ["min","max"].forEach(bound => {
        const pts = [];
        sieves.forEach(s => {
          const v = stats[bound][s.key];
          if (v !== null && v !== undefined) pts.push([xOf(s.mm), yOf(v)]);
        });
        if (pts.length > 1){
          doc.setDrawColor(20,20,20); doc.setLineWidth(0.011);
          for (let i=0;i<pts.length-1;i++) doc.line(pts[i][0],pts[i][1],pts[i+1][0],pts[i+1][1]);
        }
      });
    }

    {
      const pts = [];
      sieves.forEach(s => {
        const v = stats.avg[s.key];
        if (v !== null && v !== undefined) pts.push([xOf(s.mm), yOf(v)]);
      });
      if (pts.length > 1){
        doc.setDrawColor.apply(doc, KRAEMER_RED); doc.setLineWidth(0.02);
        for (let i=0;i<pts.length-1;i++) doc.line(pts[i][0],pts[i][1],pts[i+1][0],pts[i+1][1]);
      }
      doc.setFillColor.apply(doc, KRAEMER_RED);
      pts.forEach(p => doc.circle(p[0], p[1], 0.028, "F"));
    }

    // legend: outside the chart, to the right of it, at the same vertical position as before
    {
      const entries = [{label:"Average", dashed:false, color:KRAEMER_RED}];
      if (showMinMaxFlag) entries.push({label:"Min/Max", dashed:false, color:[20,20,20]});
      if (showSpecFlag) entries.push({label:"Spec", dashed:true, color:[107,113,117]});

      const swatchW = 0.22, rowH = 0.14, pad = 0.06;
      doc.setFont("helvetica","normal"); doc.setFontSize(7);
      const textW = Math.max.apply(null, entries.map(e => doc.getTextWidth(e.label)));
      const legendW = swatchW + 0.06 + textW + pad*2;
      const legendH = entries.length*rowH + pad*2;
      const legendX = x0 + w + 0.15;
      const legendY = y0 + mT + 0.06;

      doc.setFillColor(255,255,255); doc.setDrawColor(190,190,190); doc.setLineWidth(0.006);
      doc.rect(legendX, legendY, legendW, legendH, "FD");

      entries.forEach((e, i) => {
        const rowY = legendY + pad + i*rowH + rowH/2;
        const lx1 = legendX + pad, lx2 = lx1 + swatchW;
        doc.setDrawColor.apply(doc, e.color);
        doc.setLineWidth(e.dashed ? 0.011 : 0.02);
        if (e.dashed) doc.setLineDashPattern([0.025,0.02], 0);
        doc.line(lx1, rowY, lx2, rowY);
        if (e.dashed) doc.setLineDashPattern([], 0);
        doc.setFont("helvetica","normal"); doc.setFontSize(7); doc.setTextColor(20,20,20);
        doc.text(e.label, lx2+0.06, rowY+0.025);
      });
    }
  }

  function buildReportPdf(opts){
    const doc = new jspdf.jsPDF({unit:"in", format:"letter"});
    const pageW = 8.5, pageH = 11, margin = 0.5;
    const contentW = pageW - margin*2;
    let y = margin;
    let boxTop = margin;

    function closeSectionBox(){
      doc.setDrawColor(0,0,0); doc.setLineWidth(0.014);
      doc.rect(margin, boxTop, contentW, y - boxTop);
    }
    function newPageIfNeeded(need){
      if (y + need > pageH - margin - 0.3){
        closeSectionBox();
        doc.addPage();
        y = margin;
        return true;
      }
      return false;
    }
    function sectionBar(label){
      newPageIfNeeded(0.3);
      boxTop = y;
      doc.setFillColor.apply(doc, KRAEMER_RED);
      doc.rect(margin, y, contentW, 0.26, "F");
      doc.setFont("helvetica","bold"); doc.setFontSize(11); doc.setTextColor(255,255,255);
      doc.text(label, margin+0.08, y+0.185);
      y += 0.26;
    }

    // header: logo enlarged and pulled toward the top-left corner; title centered on the page
    const logoW = 1.4, logoH = logoW * (336/500);
    const logoX = margin - 0.15, logoY = margin - 0.15;
    if (opts.logoDataUrl){
      doc.addImage(opts.logoDataUrl, "PNG", logoX, logoY, logoW, logoH);
    }
    doc.setFont("helvetica","bold"); doc.setFontSize(22); doc.setTextColor(0,0,0);
    doc.text("Material Gradation Report", pageW/2, logoY + logoH/2 + 0.08, {align:"center"});
    y = logoY + logoH + 0.15;

    const contentLeft = margin + 0.08; // same inset as the section header label

    sectionBar("Product Details");
    doc.setFontSize(9.5);
    const fieldValueX = margin + 0.75; // matches the 0.75" tab stop used in the Word template, measured from the table edge
    const lines = [
      ["Name: ", opts.product],
      ["Source: ", opts.quarry + " Quarry"],
      ["Type: ", opts.sampleTypeText],
      ["Period: ", opts.periodText]
    ];
    y += 0.16;
    lines.forEach(function(pair){
      doc.setFont("helvetica","normal"); doc.setTextColor(20,20,20);
      doc.text(pair[0], contentLeft, y);
      doc.setFont("helvetica","bold");
      doc.text(String(pair[1]), fieldValueX, y);
      y += 0.19;
    });
    y += 0.08;
    closeSectionBox();

    sectionBar("Gradation Curve");
    const chartW = contentW * 0.70; // ~30% smaller than full width
    const chartH = chartW / 2;      // keep the 2:1 aspect ratio
    const chartX = margin + (contentW - chartW) / 2; // centered
    drawChartPdf(doc, chartX, y, chartW, chartH, opts.sieves, opts.stats, opts.specs, opts.showSpec, opts.showMinMax);
    y += chartH + 0.19;
    if (!opts.selectedDaysOnly){
      doc.setFont("helvetica","italic"); doc.setFontSize(8); doc.setTextColor(90,90,90);
      doc.text("Data covers entire sampling period.", contentLeft, y);
      y += 0.08;
    } else {
      y += 0.08;
    }
    closeSectionBox();

    sectionBar("Recent Tests");
    y += 0.12;
    const sieves = opts.sieves;
    const dateColW = 0.9;
    const sieveColW = sieves.length ? Math.min(0.55, (contentW - 0.08 - dateColW) / sieves.length) : 0.55;
    const rowH = 0.17;
    const tableRight = contentLeft + dateColW + sieves.length*sieveColW;

    function drawTableHeader(){
      doc.setFont("helvetica","bold"); doc.setFontSize(7.5); doc.setTextColor(69,75,78);
      doc.text("Sample Date", contentLeft, y);
      sieves.forEach(function(s,i){ doc.text(s.label, contentLeft+dateColW+i*sieveColW+sieveColW/2, y, {align:"center"}); });
      y += 0.03;
      doc.setDrawColor(160,160,160); doc.setLineWidth(0.007);
      doc.line(contentLeft, y, tableRight, y);
      y += 0.13;
    }
    drawTableHeader();

    doc.setFont("helvetica","normal"); doc.setFontSize(8);
    opts.includedDayAverages.forEach(function(d){
      if (newPageIfNeeded(rowH)){
        sectionBar("Recent Tests (continued)");
        y += 0.12;
        drawTableHeader();
      }
      doc.setTextColor(20,20,20);
      doc.text(fmtDate(d.date), contentLeft, y);
      sieves.forEach(function(s,i){
        const v = d.values[s.key];
        const text = (v === null || v === undefined) ? "\u2014" : v.toFixed(1);
        doc.text(text, contentLeft+dateColW+i*sieveColW+sieveColW/2, y, {align:"center"});
      });
      y += rowH;
    });

    if (newPageIfNeeded(rowH*2)){
      sectionBar("Recent Tests (continued)");
      y += 0.12;
      drawTableHeader();
    }
    doc.setDrawColor(0,0,0); doc.setLineWidth(0.014);
    doc.line(contentLeft, y-0.11, tableRight, y-0.11);
    doc.setFont("helvetica","bold"); doc.setFontSize(8);
    doc.setTextColor(0,0,0);
    doc.text("Average", contentLeft, y);
    sieves.forEach(function(s,i){
      const v = opts.stats.avg[s.key];
      const text = (v === null || v === undefined) ? "\u2014" : v.toFixed(1);
      doc.text(text, contentLeft+dateColW+i*sieveColW+sieveColW/2, y, {align:"center"});
    });
    y += rowH + 0.16;
    if (!opts.selectedDaysOnly){
      doc.setFont("helvetica","italic"); doc.setFontSize(8); doc.setTextColor(90,90,90);
      doc.text("Averages are over entire sampling period.", contentLeft, y);
      y += 0.08;
    } else {
      y += 0.08;
    }
    closeSectionBox();

    sectionBar("Comments");
    y += 0.16;
    doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(20,20,20);
    const commentText = (opts.comments && opts.comments.trim()) ? opts.comments : "N/A";
    const commentLines = doc.splitTextToSize(commentText, contentW - 0.08);
    commentLines.forEach(function(line){
      if (newPageIfNeeded(0.18)){
        sectionBar("Comments (continued)");
        y += 0.16;
      }
      doc.text(line, contentLeft, y);
      y += 0.16;
    });
    closeSectionBox();

    const totalPages = doc.internal.getNumberOfPages();
    for (let p = 1; p <= totalPages; p++){
      doc.setPage(p);
      doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(90,90,90);
      doc.text("Generated by " + opts.generatedBy + " on " + opts.generatedDate, margin, pageH-margin+0.18);
      doc.text("Page " + p + "/" + totalPages, pageW-margin, pageH-margin+0.18, {align:"right"});
    }
    return doc;
  }

  /* ---- G&B-104 Excel: surgical cell edit, preserving every byte outside the target cells ---- */
  function xlsxColToNum(col){
    let n = 0;
    for (let i = 0; i < col.length; i++) n = n * 26 + (col.charCodeAt(i) - 64);
    return n;
  }
  function xlsxSplitCoord(coord){
    const m = coord.match(/^([A-Z]+)(\d+)$/);
    return {col: m[1], row: parseInt(m[2], 10), colNum: xlsxColToNum(m[1])};
  }
  // Some target cells don't exist in the sheet's sparse XML at all (Excel omits genuinely blank,
  // unstyled cells). When that happens, insert a new <c> element in the correct column position
  // within its <row>, optionally borrowing a style index from a similar reference cell.
  function xlsxInsertCellIntoRow(xml, coord, cellXmlBuilder, fallbackStyleFromCoord){
    const target = xlsxSplitCoord(coord);
    const rowRe = new RegExp('(<row r="' + target.row + '"[^>]*>)([\\s\\S]*?)(</row>)');
    const rowMatch = xml.match(rowRe);
    if (!rowMatch) throw new Error("Row " + target.row + " was not found in the template — cannot place cell " + coord + ".");
    const rowOpen = rowMatch[1], rowInner = rowMatch[2], rowClose = rowMatch[3];

    let styleAttr = "";
    if (fallbackStyleFromCoord){
      const fm = xml.match(new RegExp('<c r="' + fallbackStyleFromCoord + '"[^>]*\\bs="(\\d+)"'));
      if (fm) styleAttr = ' s="' + fm[1] + '"';
    }
    const newCellXml = cellXmlBuilder(styleAttr);

    const cellRe = /<c r="([A-Z]+)(\d+)"[^>]*?(?:\/>|>[\s\S]*?<\/c>)/g;
    let insertBefore = null, cm;
    while ((cm = cellRe.exec(rowInner)) !== null){
      if (xlsxColToNum(cm[1]) > target.colNum){ insertBefore = cm[0]; break; }
    }
    const newRowInner = insertBefore ? rowInner.replace(insertBefore, newCellXml + insertBefore) : (rowInner + newCellXml);
    return xml.replace(rowRe, rowOpen + newRowInner + rowClose);
  }
  function xlsxSetTextCell(xml, coord, text, fallbackStyleFromCoord){
    let re = new RegExp('<c r="' + coord + '"([^>]*)/>');
    let m = xml.match(re);
    if (m){
      return xml.replace(re, '<c r="' + coord + '"' + m[1] + ' t="inlineStr"><is><t xml:space="preserve">' + escapeXml(text) + '</t></is></c>');
    }
    re = new RegExp('<c r="' + coord + '"([^>]*)>[\\s\\S]*?</c>');
    m = xml.match(re);
    if (m){
      const attrs = m[1].replace(/\s+t="[^"]*"/, "");
      return xml.replace(re, '<c r="' + coord + '"' + attrs + ' t="inlineStr"><is><t xml:space="preserve">' + escapeXml(text) + '</t></is></c>');
    }
    return xlsxInsertCellIntoRow(xml, coord, function(styleAttr){
      return '<c r="' + coord + '"' + styleAttr + ' t="inlineStr"><is><t xml:space="preserve">' + escapeXml(text) + '</t></is></c>';
    }, fallbackStyleFromCoord);
  }
  function xlsxSetNumberCell(xml, coord, num, fallbackStyleFromCoord){
    let re = new RegExp('<c r="' + coord + '"([^>]*)/>');
    let m = xml.match(re);
    if (m){
      return xml.replace(re, '<c r="' + coord + '"' + m[1] + '><v>' + num + '</v></c>');
    }
    re = new RegExp('<c r="' + coord + '"([^>]*)>[\\s\\S]*?</c>');
    m = xml.match(re);
    if (m){
      const attrs = m[1].replace(/\s+t="[^"]*"/, "");
      return xml.replace(re, '<c r="' + coord + '"' + attrs + '><v>' + num + '</v></c>');
    }
    return xlsxInsertCellIntoRow(xml, coord, function(styleAttr){
      return '<c r="' + coord + '"' + styleAttr + '><v>' + num + '</v></c>';
    }, fallbackStyleFromCoord);
  }

  let gb104DriveId = null;
  async function getGB104DriveId(){
    if (gb104DriveId) return gb104DriveId;
    const data = await graphGet("https://graph.microsoft.com/v1.0/sites/" + SITE_ID + "/drives");
    const drives = data.value || [];
    let drive = drives.find(d => d.webUrl && d.webUrl.indexOf(GB104_LIBRARY_URL_SEGMENT) !== -1);
    if (!drive) drive = drives.find(d => d.name === GB104_LIBRARY_NAME);
    if (!drive) throw new Error("Could not find the Cert of Agg Templates document library on this site (looked for URL segment '" + GB104_LIBRARY_URL_SEGMENT + "' and name '" + GB104_LIBRARY_NAME + "').");
    gb104DriveId = drive.id;
    return gb104DriveId;
  }

  // Look up the template file by its CertCode column value rather than its filename, so files
  // can be named however is convenient and the lookup still works.
  async function getGB104FileIdByCertCode(certCode){
    const driveId = await getGB104DriveId();
    const data = await graphGet(
      "https://graph.microsoft.com/v1.0/drives/" + driveId + "/root/children?expand=listItem(expand=fields)"
    );
    const items = data.value || [];
    const match = items.find(item => {
      const fields = item.listItem && item.listItem.fields;
      return fields && String(fields[GB104_CERT_CODE_COLUMN] || "").trim().toUpperCase() === certCode.toUpperCase();
    });
    if (!match) throw new Error("No file in the Cert of Agg Templates library has " + GB104_CERT_CODE_COLUMN + " = '" + certCode + "'.");
    return {driveId: driveId, itemId: match.id, name: match.name};
  }

  async function fetchGB104TemplateBytes(certCode){
    const found = await getGB104FileIdByCertCode(certCode);
    const token = await getToken();
    const res = await fetch(
      "https://graph.microsoft.com/v1.0/drives/" + found.driveId + "/items/" + found.itemId + "/content",
      {headers: {Authorization: "Bearer " + token}}
    );
    if (!res.ok) throw new Error("Could not download '" + found.name + "' (HTTP " + res.status + ")");
    return res.arrayBuffer();
  }

  async function generateGB104Excel(certCode, quarry, product, generatedBy, generatedDateText, testDayCount){
    const templateBytes = await fetchGB104TemplateBytes(certCode);
    const zip = await JSZip.loadAsync(templateBytes);
    const sheetPath = "xl/worksheets/sheet1.xml";
    const sheetFile = zip.file(sheetPath);
    if (!sheetFile) throw new Error("Could not find " + sheetPath + " inside the template.");
    let sheetXml = await sheetFile.async("string");
    sheetXml = xlsxSetTextCell(sheetXml, "A14", generatedBy);
    sheetXml = xlsxSetTextCell(sheetXml, "A17", generatedBy, "A14");
    sheetXml = xlsxSetTextCell(sheetXml, "I17", generatedDateText);
    sheetXml = xlsxSetNumberCell(sheetXml, "L20", testDayCount);
    zip.file(sheetPath, sheetXml);
    const out = await zip.generateAsync({type:"blob"});
    const dateForFilename = generatedDateText.replace(/\//g, "-");
    downloadBlob(out, sanitizeFilenamePart("Cert of Agg " + quarry + " " + product + " " + dateForFilename) + ".xlsx");
  }

  function downloadBlob(blob, filename){
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  }

  function sanitizeFilenamePart(s){
    return String(s || "").replace(/[^a-zA-Z0-9._-]+/g, "_");
  }

  async function generateReport(){
    if (!lastRenderState){ showError("Nothing to generate yet — data is still loading."); return; }
    const wantGradation = $("genGradationReport").checked;
    const wantCert = $("genCertOfAgg").checked;
    if (!wantGradation && !wantCert){ showError("Select at least one report to generate."); return; }

    const btn = $("generateBtn"), hint = $("generateHint");
    const originalHint = hint.textContent;
    btn.disabled = true;
    clearError();
    try {
      const st = lastRenderState;
      const sampleTypeText = ["Production","Loadout","Other"].filter(t => selectedSampleTypes[t]).join(", ") || "—";
      let periodText;
      if (st.chartSelectedDaysOnly){
        periodText = st.includedDayAverages.length
          ? (fmtDate(st.includedDayAverages[0].date) + " – " + fmtDate(st.includedDayAverages[st.includedDayAverages.length-1].date))
          : "Selected Test Days";
      } else {
        periodText = fmtDate(displayStart) + " – " + fmtDate(displayEnd);
      }
      const generatedBy = (activeAccount && (activeAccount.name || activeAccount.username)) || "Unknown";
      const generatedDate = fmtDate(new Date());
      const productLabel = getProductDisplayName() || "—";

      if (wantGradation){
        hint.textContent = "Building PDF…";
        const doc = buildReportPdf({
          logoDataUrl: "data:image/png;base64," + KRAEMER_LOGO_BASE64,
          quarry: selectedQuarry || "—",
          product: productLabel,
          sampleTypeText: sampleTypeText,
          periodText: periodText,
          sieves: st.sieves,
          stats: st.stats,
          specs: st.specs,
          showSpec: st.showSpec,
          showMinMax: st.showMinMax,
          includedDayAverages: st.includedDayAverages,
          comments: $("reportComments").value,
          generatedBy: generatedBy,
          generatedDate: generatedDate,
          selectedDaysOnly: st.chartSelectedDaysOnly
        });
        const pdfFilename = "Gradation_Report_" + sanitizeFilenamePart(selectedQuarry) + "_" +
          sanitizeFilenamePart(productLabel) + "_" + sanitizeFilenamePart(generatedDate.replace(/\//g,"-")) + ".pdf";
        doc.save(pdfFilename);
      }

      if (wantCert){
        const certLetter = st.productFields ? String(st.productFields.CertOfAgg || "").trim() : "";
        if (!certLetter){
          showError("This product does not have an associated Cert of Agg.");
        } else {
          hint.textContent = "Fetching G&B-104 template…";
          await generateGB104Excel(certLetter, selectedQuarry || "—", productLabel, generatedBy, generatedDate, st.includedDayAverages.length);
        }
      }
      hint.textContent = originalHint;
    } catch(e){
      showError("Report generation failed: " + e.message);
      hint.textContent = originalHint;
    } finally {
      btn.disabled = false;
    }
  }

  /* ================================================================
     BOOT
     ================================================================ */
  $("generateBtn").addEventListener("click", generateReport);
  initAuth();

})();
</script>
</body>
</html>
